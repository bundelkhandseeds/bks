<header
  class="absolute inset-x-0 top-0 z-50 border-b border-stone-200/55 bg-white/88 backdrop-blur-md supports-[backdrop-filter]:bg-white/75"
>
  <nav class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-x-6 gap-y-3 px-4 py-4 sm:px-6 lg:px-8" aria-label="Primary">
    <div class="flex min-w-0 flex-1 items-center lg:flex-none">
      <a routerLink="/" class="-m-1 flex min-w-0 items-start gap-3 rounded-md p-1 outline-offset-4 ring-bks-forest focus-visible:ring-2">
        <span class="sr-only">Bundelkhand Seeds — home</span>
        <img src="/bks-logo.png" alt="" width="56" height="84" class="h-12 w-auto shrink-0 object-contain sm:h-14" />
        <div class="min-w-0 pt-0.5">
          <div class="text-base font-semibold leading-tight text-bks-forest sm:text-lg">Bundelkhand Seeds Pvt. Ltd.</div>
          <div class="mt-0.5 text-xs font-medium text-stone-600 sm:text-sm">Jalaun, Uttar Pradesh</div>
          <div class="mt-1 hidden font-serif text-[0.6875rem] font-medium uppercase tracking-[0.12em] text-bks-gold md:block">
            Vegetable green pea specialists
          </div>
        </div>
      </a>
    </div>

    <div class="flex items-center gap-4 sm:gap-6 lg:flex-1 lg:justify-end">
      <div class="hidden sm:block">
        <a
          routerLink="/products"
          routerLinkActive="text-bks-forest"
          [routerLinkActiveOptions]="{ exact: false }"
          class="rounded-md px-2 py-1 text-sm font-semibold text-stone-700 underline-offset-4 transition-colors hover:text-bks-forest hover:underline"
        >
          Products
        </a>
      </div>
      <a
        href="tel:+919415114208"
        class="inline-flex items-center gap-2 rounded-full border border-stone-200 bg-bks-paper px-3.5 py-2 text-sm font-semibold text-bks-earth shadow-sm transition hover:border-bks-sage-soft hover:bg-white"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-[1.125rem] shrink-0 text-bks-forest" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z" />
        </svg>
        <span><span class="sr-only">Call </span>+91 94151 14208</span>
      </a>
    </div>

    <div class="basis-full pt-2 sm:hidden">
      <a
        routerLink="/products"
        routerLinkActive="text-bks-forest"
        [routerLinkActiveOptions]="{ exact: false }"
        class="rounded-md px-1 text-sm font-semibold text-stone-700 underline-offset-4 hover:text-bks-forest hover:underline"
      >
        Products
      </a>
    </div>
  </nav>
</header>
